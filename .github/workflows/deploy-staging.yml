name: Portfolio SaaS CI/CD - Deploy STAGING

on:
  push:
    branches:
      - develop

env:
  PYTHON_VERSION: "3.11"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  ########################
  # TESTS & QUALITY
  ########################

  tests:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      SECRET_KEY: test-secret-key
      CELERY_TASK_ALWAYS_EAGER: "True"
      REDIS_URL: redis://localhost:6379/0

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          pip install -r requirements.txt

          pip install \
            pytest \
            pytest-django \
            pytest-cov \
            coverage \
            ruff

      - name: Run Ruff
        run: |
          ruff check .

      - name: Run Ruff Format Check
        run: |
          ruff format . --check

      - name: Run Django checks
        run: |
          cd src
          python manage.py check

      - name: Run migrations
        run: |
          cd src
          python manage.py migrate --noinput

      - name: Run pytest with coverage
        run: |
          cd src

          pytest \
            --maxfail=1 \
            --disable-warnings \
            --cov=apps \
            --cov-report=term-missing \
            --cov-report=xml \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: src/coverage.xml

  ########################
  # DEPLOY STAGING
  ########################

  deploy_staging:
    needs: tests
    runs-on: ubuntu-latest

    # IMPORTANT
    if: github.ref == 'refs/heads/develop'

    steps:

      - name: Deploy to PlanetHoster Staging
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.PLANETHOSTER_HOST }}
          username: ${{ secrets.PLANETHOSTER_USER }}
          key: ${{ secrets.PLANETHOSTER_SSH_KEY }}
          port: ${{ secrets.PLANETHOSTER_PORT }}

          script: |

            set -e

            echo "=== STAGING DEPLOY START ==="

            cd ~/mkinty/mk_portfolio

            echo "=== GIT PULL ==="
            echo "=== GIT FORCE SYNC ==="

            git fetch origin develop:develop
            git checkout develop
            git reset --hard develop

            echo "=== ACTIVATE VENV ==="
            source ~/virtualenv/mkinty/mk_portfolio/src/3.11/bin/activate

            echo "=== INSTALL REQUIREMENTS ==="
            pip install -r requirements.txt

            cd src

            echo "=== DJANGO MIGRATIONS ==="
            python manage.py migrate --noinput

            echo "=== COLLECTSTATIC ==="
            python manage.py collectstatic --noinput

            echo "=== RESTART PASSENGER ==="
            touch tmp/restart.txt
            
            echo "=== STOP OLD CELERY ==="
            pkill -f "celery -A config worker" || true
            
            echo "=== STOP OLD REDIS ==="
            pkill -f "redis-server" || true
            
            echo "=== START NEW REDIS SERVICES ==="
            redis-server --daemonize yes
            
            echo "=== START NEW CELERY SERVICES ==="
            nohup python -m celery -A config worker \
            -l info \
            --concurrency=2 \
            > celery.log 2>&1 &

            echo "=== STAGING DEPLOY SUCCESS ==="