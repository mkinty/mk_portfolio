{% load static %}

{% include 'includes/messages.html' %}
<div class="register" id="large">
  <div class="close-bnt">
    <img class="btn-icon"
         id="close-btn"
         src="{% static 'icons/close.png' %}"
         alt="close-btn">
  </div>
  <div class="register-header">
    {{ title }}
  </div>
  <div class="register-content">
    <form hx-post="{{ request.path }}"
          hx-target="#dialog"
          hx-swap="innerHTML"
          enctype="multipart/form-data"
    >
      {% csrf_token %}
      {{ form.media }}

      <div class="field">
        <label>Intitulé du poste</label>
        {{ form.position }}
      </div>
      <div class="field">
        <label>Entreprise</label>
        {{ form.company }}
      </div>
      <div class="field">
        <label>Lien vers l'offre</label>
        {{ form.job_offer_link }}
      </div>
      <div class="field">
        <label>Offre sous format fichier</label>
        {{ form.job_offer_file }}
      </div>
      <div class="field">
        <label>CV adapté à l'offre</label>
        {{ form.resume }}
      </div>
      <div class="field">
        <label>Lettre de motivation adaptée à l'offre</label>
        {{ form.cover_letter }}
      </div>
      <div class="field">
        <label>Date de candidature</label>
        {{ form.application_date }}
      </div>
      <div class="field">
        <label>État de la candidature</label>
        {{ form.application_status }}
      </div>
      <div class="btns actions">
        <button class="btn cancel primary" id="cancel" type="button">Annuler</button>
        <button class="btn valid primary" type="submit">Enregistrer</button>
      </div>
    </form>
  </div>
</div>
