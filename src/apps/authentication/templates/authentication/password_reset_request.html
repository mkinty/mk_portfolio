{% load static %}
<div class="register" id="medium">
  <div class="register-header">
    Réinitialisation du mot de passe
  </div>
  <div class="register-content">
    <form hx-post="{{ request.path }}"
          hx-target="#dialog"
          enctype="multipart/form-data"
    >
      {% csrf_token %}

      <div class="field">
        <label class="title">Entrer votre email afin de recevoir les instructions à suivre</label>
        <input type="email" name="email" placeholder="Email" value="{{data.email}}" required>
      </div>
      <div class="register-link">
        Vous avez déjà compte ? <a hx-get="{% url 'auth:login' %}"
                                   hx-target="#dialog"
                                   class="btn link">Connectez-vous</a>
      </div>
      <div class="register-link">
        Vous n'avez pas encore de compte ? <a hx-get="{% url 'auth:register' %}"
                                              hx-target="#dialog"
                                              class="btn link">Créer un compte</a>
      </div>
      <div class="btns actions">
        <div class="secondary btn" id="cancel"
        >Annuler
        </div>
        <button class="primary btn" type="submit">Se connecter</button>
      </div>
    </form>
  </div>
</div>
