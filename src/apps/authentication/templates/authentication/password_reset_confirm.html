{% extends "base.html" %}
{% block content %}
{% include 'includes/messages.html' %}
<div class="register">
  <div class="register-container medium">
    <div class="register-header">
    Réinitialisation du mot de passe
  </div>
  <div class="register-content">
    <form method="POST"
          action="{{ request.path }}"
          enctype="multipart/form-data"
    >
      {% csrf_token %}

      <div class="field">
        <label>Mot de passe</label>
        <input type="password" name="password" placeholder="Votre mot de passe" value="" required>
      </div>
      <div class="field">
        <label>Confirmer le mot de passe</label>
        <input type="password" name="password2" placeholder="Confirmer votre mot de passe" value="" required>
      </div>

      <div class="btns actions">
        <a href="{% url 'home:home-page' %}" class="secondary btn" id="cancel"
        >Annuler
        </a>
        <button class="primary btn" type="submit">Réinitialiser</button>
      </div>
    </form>
  </div>
  </div>
</div>
{% endblock content%}
